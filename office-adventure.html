// --- INPUT ---
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.key.toLowerCase()] = true;
  keys[e.code] = true;

  // Snapshot the state so that a state change mid-handler doesn't cascade
  const st = game.state;

  if (st === 'title') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      game.levelSelectIndex = (game.levelSelectIndex - 1 + 3) % 3;
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      game.levelSelectIndex = (game.levelSelectIndex + 1) % 3;
    } else if (e.code === 'Space' || e.code === 'Enter') {
      if (game.levelSelectIndex === 2) {
        game.level = 3;
      } else {
        game.level = game.levelSelectIndex + 1;
      }
      startGame();
    }
  } else if (st === 'playing') {
    if (e.code === 'KeyE') tryInteract();
    if (e.code === 'Digit1') useItem(0);
    if (e.code === 'Digit2') useItem(1);
    if (e.code === 'Space' && game.saltAmmo > 0) fireSalt();
    if (e.code === 'KeyH') toggleHiding();
    if (e.code === 'KeyQ') throwPaperBall();
  } else if (st === 'interact' && (e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyE')) {
    advanceDialogue();
  } else if (st === 'fridgeMenu') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      game.fridgeMenuIndex = (game.fridgeMenuIndex - 1 + game.fridgeItems.length) % game.fridgeItems.length;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      game.fridgeMenuIndex = (game.fridgeMenuIndex + 1) % game.fridgeItems.length;
    }
    if (e.code === 'Enter' || e.code === 'KeyE') {
      pickFromFridge();
    }
    if (e.code === 'Escape') {
      game.state = 'playing';
    }
  } else if (st === 'npcMenu') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      game.npcMenuIndex = (game.npcMenuIndex - 1 + game.npcMenuOptions.length) % game.npcMenuOptions.length;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      game.npcMenuIndex = (game.npcMenuIndex + 1) % game.npcMenuOptions.length;
    }
    if (e.code === 'Enter' || e.code === 'KeyE') {
      handleNpcMenuSelect();
    }
    if (e.code === 'Escape') {
      game.state = 'playing';
    }
  } else if (st === 'vendorMenu') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      game.vendorMenuIndex = (game.vendorMenuIndex - 1 + game.vendorItems.length) % game.vendorItems.length;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      game.vendorMenuIndex = (game.vendorMenuIndex + 1) % game.vendorItems.length;
    }
    if (e.code === 'Enter' || e.code === 'KeyE') {
      handleVendorBuy();
    }
    if (e.code === 'Escape') {
      game.state = 'playing';
    }
  } else if ((st === 'pub' || st === 'win') && (e.code === 'Space' || e.code === 'Enter')) {
    resetGame();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => {

function isSolid(tileType) {
  return [TILE_WALL, TILE_DESK, TILE_FRIDGE, TILE_KITCHEN, TILE_MONITOR, TILE_SINK, TILE_COPIER, TILE_SOFA, TILE_PLANT, TILE_WATER_COOLER, TILE_WET_FLOOR].includes(tileType)
    || (tileType === TILE_DOOR_LOCKED && !game.officeDoorUnlocked);
}

function getTile(room, px, py) {
  const gx = Math.floor(px / T), gy = Math.floor(py / T);
  if (gy < 0 || gy >= ROWS || gx < 0 || gx >= COLS) return TILE_WALL;
  return room.grid[gy][gx];
}

function canMoveTo(nx, ny, w, h) {
  const room = rooms[game.currentRoom];
  const margin = 4;
  const points = [
    { x: nx + margin, y: ny + margin },
    { x: nx + w - margin, y: ny + margin },
    { x: nx + margin, y: ny + h - margin },
    { x: nx + w - margin, y: ny + h - margin },
  ];
  for (const p of points) {
    if (isSolid(getTile(room, p.x, p.y))) return false;
  }
  return true;
}


function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawTile(tileType, px, py) {
  const x = px * T, y = py * T;
  switch(tileType) {
    case TILE_FLOOR:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      break;
    case TILE_WALL:
      drawPixelRect(x, y, T, T, C.wallDark);
      drawPixelRect(x, y, T, T - 4, C.wall);
      drawPixelRect(x + 2, y + 2, T - 4, 4, C.wallTop);
      break;
    case TILE_DESK:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      drawPixelRect(x + 2, y + 4, T - 4, T - 8, C.desk);
      drawPixelRect(x + 4, y + 6, T - 8, T - 12, C.deskTop);
      break;
    case TILE_CHAIR:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      drawPixelRect(x + 10, y + 8, T - 20, T - 12, C.chair);
      drawPixelRect(x + 12, y + 10, T - 24, T - 16, C.chairSeat);
      drawPixelRect(x + 8, y + T - 8, 4, 4, '#444');
      drawPixelRect(x + T - 12, y + T - 8, 4, 4, '#444');
      break;
    case TILE_DOOR:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      drawPixelRect(x + 4, y, T - 8, T, C.doorFrame);
      drawPixelRect(x + 6, y + 2, T - 12, T - 4, C.door);
      drawPixelRect(x + T - 14, y + T/2 - 2, 4, 6, '#888');
      if (Math.sin(game.frameCount * 0.05) > 0) {
        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.fillRect(x, y, T, T);
      }
      break;
    case TILE_DOOR_LOCKED:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      drawPixelRect(x + 4, y, T - 8, T, C.doorFrame);
      if (game.officeDoorUnlocked) {
        drawPixelRect(x + 6, y + 2, T - 12, T - 4, C.door);
        if (Math.sin(game.frameCount * 0.05) > 0) {
          ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
          ctx.fillRect(x, y, T, T);
        }
      } else {
        drawPixelRect(x + 6, y + 2, T - 12, T - 4, C.doorLocked);
        drawPixelRect(x + T/2 - 4, y + T/2 - 6, 8, 10, '#666');
        drawPixelRect(x + T/2 - 2, y + T/2 - 4, 4, 6, '#444');
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x + T/2, y + T/2 - 6, 5, Math.PI, 0);
        ctx.stroke();
        ctx.lineWidth = 1;
      }
      drawPixelRect(x + T - 14, y + T/2 - 2, 4, 6, '#888');
      break;
    case TILE_MONITOR:
      drawPixelRect(x, y, T, T, (px + py) % 2 === 0 ? C.floor : C.floorAlt);
      drawPixelRect(x + 10, y + 6, T - 20, T - 18, C.monitor);
      const screenColor = Math.sin(game.frameCount * 0.03 + px) > 0 ? C.monitorScreen : C.monitorScreenOff;
      drawPixelRect(x + 12, y + 8, T - 24, T - 24, screenColor);
      drawPixelRect(x + T/2 - 3, y + T - 12, 6, 8, '#444');
      break;
    case TILE_FRIDGE:
      drawPixelRect(x, y, T, T, C.fridge);
      drawPixelRect(x + 2, y + 2, T - 4, T/2 - 2, C.fridgeLight);
      drawPixelRect(x + 2, y + T/2 + 2, T - 4, T/2 - 4, C.fridgeLight);
      drawPixelRect(x + T - 8, y + 8, 3, T - 16, C.fridgeHandle);
      const fridgeDist = Math.hypot(player.x - x, player.y - y);
      if (fridgeDist < T * 2 && game.state === 'playing' && game.currentRoom === 'office') {
        const pulse = Math.sin(game.frameCount * 0.1) * 0.15 + 0.15;
        ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
        ctx.fillRect(x, y, T, T);
      }
      break;
    case TILE_CORR_FLOOR:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
      break;
    case TILE_TOILET:
      drawPixelRect(x, y, T, T, '#e8e0d0');
      drawPixelRect(x + 8, y + 4, T - 16, T - 8, '#fff');
      drawPixelRect(x + 10, y + 6, T - 20, T - 14, '#e0e8ff');
      drawPixelRect(x + 10, y + 2, T - 20, 6, '#eee');
      const glow = Math.sin(game.frameCount * 0.08) * 0.15 + 0.15;
      ctx.fillStyle = `rgba(255, 255, 100, ${glow})`;
      ctx.fillRect(x, y, T, T);
      break;
    case TILE_SINK:
      drawPixelRect(x, y, T, T, '#e8e0d0');
      drawPixelRect(x + 6, y + 6, T - 12, T - 12, '#ccc');
      drawPixelRect(x + 10, y + 10, T - 20, T - 20, '#aacaee');
      drawPixelRect(x + T/2 - 2, y + 4, 4, 8, '#999');
      break;
    case TILE_CARPET:
      drawPixelRect(x, y, T, T, '#e8e0d0');
      break;
    case TILE_PLANT:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
      drawPixelRect(x + 12, y + T - 16, T - 24, 14, '#8a5a2a');
      drawPixelRect(x + 8, y + 6, T - 16, T - 22, '#2a8a2a');
      drawPixelRect(x + 14, y + 2, T - 28, 8, '#3a9a3a');
      break;
    case TILE_WATER_COOLER:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
      drawPixelRect(x + 12, y + 10, T - 24, T - 14, '#ccc');
      drawPixelRect(x + 14, y + 2, T - 28, 12, '#aaddff');
      drawPixelRect(x + 16, y + 0, T - 32, 4, '#99ccee');
      break;
    case TILE_COPIER:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
      drawPixelRect(x + 4, y + 8, T - 8, T - 12, '#555');
      drawPixelRect(x + 6, y + 10, T - 12, 10, '#3a3a3a');
      drawPixelRect(x + 8, y + T - 8, T - 16, 6, '#eee');
      const copierBlink = game.frameCount % 120 < 10;
      drawPixelRect(x + T - 12, y + 12, 4, 4, copierBlink ? '#f44' : '#4a4');
      break;
    case TILE_SOFA:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.strokeRect(x + 1, y + 1, T - 2, T - 2);
      drawPixelRect(x + 2, y + 8, T - 4, T - 12, '#6a4a2a');
      drawPixelRect(x + 4, y + 10, T - 8, T - 18, '#8a6a3a');
      drawPixelRect(x + 2, y + 4, T - 4, 8, '#5a3a1a');
      drawPixelRect(x, y + 6, 4, T - 14, '#5a3a1a');
      drawPixelRect(x + T - 4, y + 6, 4, T - 14, '#5a3a1a');
      break;
    case TILE_EXIT_DOOR:
      drawPixelRect(x, y, T, T, '#9a8a7a');
      drawPixelRect(x + 4, y, T - 8, T, '#8b7300');
      drawPixelRect(x + 6, y + 2, T - 12, T - 4, '#aa3333');
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', x + T/2, y + T/2 + 3);
      ctx.textAlign = 'left';
      drawPixelRect(x + T - 14, y + T/2 - 2, 4, 6, '#888');
      if (Math.sin(game.frameCount * 0.08) > 0) {
        ctx.fillStyle = 'rgba(255, 60, 60, 0.12)';
        ctx.fillRect(x, y, T, T);
      }
      break;
    case TILE_WET_FLOOR:
      drawPixelRect(x, y, T, T, '#e8e0d0');
      // Yellow warning triangle
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.moveTo(x + T/2, y + 2);
      ctx.lineTo(x + T - 2, y + T - 2);
      ctx.lineTo(x + 2, y + T - 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#cc9900';
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
  }
}

function drawRoom() {
  const room = rooms[game.currentRoom];
  for (let py = 0; py < ROWS; py++)
    for (let px = 0; px < COLS; px++)
      if (room.grid[py] && room.grid[py][px] !== undefined)
        drawTile(room.grid[py][px], px, py);

  // Draw occupied cubicle markers
  if (game.currentRoom === 'toiletArea' && room.winTiles && game.occupiedCubicle >= 0) {
    const wt = room.winTiles[game.occupiedCubicle];
    const x = wt.x * T, y = wt.y * T;
    ctx.fillStyle = '#cc3333';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('OCCUPIED', x + T/2, y + T - 4);
    ctx.textAlign = 'left';
  }
}



function drawPlayer() {
  const px = player.x, py = player.y, w = player.w, h = player.h;

  if (player.isHiding) {
    ctx.globalAlpha = 0.3;
    // Draw smaller crouching version
    drawPixelRect(px + 4, py + 15, player.w - 8, player.h - 15, C.playerShirt);
    drawPixelRect(px + 6, py + 12, player.w - 12, 8, C.playerSkin);
    drawPixelRect(px + 5, py + 10, player.w - 10, 5, C.playerHair);
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(100, 200, 255, 0.7)'; ctx.font = 'bold 10px monospace';
    ctx.fillText('HIDING', px - 2, py + 6);
    return;
  }

  ctx.fillStyle = C.shadow;
  ctx.beginPath();
  ctx.ellipse(px + w/2, py + h, w/2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = player.sneaking ? 0.7 : 1;
  const bob = player.walking ? Math.sin(game.frameCount * 0.3) * 2 : 0;
  const sneakCrouch = player.sneaking ? 6 : 0;
  const bY = py + bob + sneakCrouch;

  const shoeY = py + h - 4;
  if (player.walking) {
    const legAnim = Math.sin(game.frameCount * 0.3) * 3;
    drawPixelRect(px + 3, shoeY, 7, 4, C.playerShoes);
    drawPixelRect(px + w - 10, shoeY + legAnim * 0.5, 7, 4, C.playerShoes);
  } else {
    drawPixelRect(px + 3, shoeY, 7, 4, C.playerShoes);
    drawPixelRect(px + w - 10, shoeY, 7, 4, C.playerShoes);
  }

  const trouserTop = bY + 22;
  const trouserH = h - 26 - sneakCrouch;
  if (player.walking) {
    const legAnim = Math.sin(game.frameCount * 0.3) * 3;
    drawPixelRect(px + 3, trouserTop, 7, trouserH, C.playerTrousers);
    drawPixelRect(px + w - 10, trouserTop + legAnim * 0.3, 7, trouserH, C.playerTrousers);
  } else {
    drawPixelRect(px + 3, trouserTop, 7, trouserH, C.playerTrousers);
    drawPixelRect(px + w - 10, trouserTop, 7, trouserH, C.playerTrousers);
  }

  drawPixelRect(px + 2, trouserTop - 1, w - 4, 3, '#6a5a3a');
  drawPixelRect(px + w/2 - 2, trouserTop - 1, 4, 3, '#8a7a4a');

  drawPixelRect(px + 2, bY + 10, w - 4, 13, C.playerShirt);
  drawPixelRect(px + 4, bY + 10, 4, 3, '#d0e8f8');
  drawPixelRect(px + w - 8, bY + 10, 4, 3, '#d0e8f8');

  drawPixelRect(px + w/2 - 2, bY + 12, 3, 10, C.playerTie);
  drawPixelRect(px + w/2 - 3, bY + 21, 5, 3, C.playerTie);

  drawPixelRect(px + 4, bY, w - 8, 14, C.playerSkin);

  drawPixelRect(px + 2, bY - 4, w - 4, 8, C.playerHair);
  drawPixelRect(px + 3, bY - 6, w - 6, 5, C.playerHair);
  drawPixelRect(px + 1, bY - 2, 4, 6, C.playerHair);
  drawPixelRect(px + w - 5, bY - 2, 4, 6, C.playerHair);
  drawPixelRect(px + 5, bY - 5, 6, 3, '#e0c460');

  const eyeY = bY + 7;
  if (player.facing === 'left') {
    drawPixelRect(px + 5, eyeY, 3, 3, '#4a2a0a');
  } else if (player.facing === 'right') {
    drawPixelRect(px + w - 8, eyeY, 3, 3, '#4a2a0a');
  } else if (player.facing !== 'up') {
    drawPixelRect(px + 7, eyeY, 3, 2, '#4a2a0a');
    drawPixelRect(px + w - 10, eyeY, 3, 2, '#4a2a0a');
    drawPixelRect(px + 8, eyeY + 4, 6, 1, '#c87a5a');
  }

  drawPixelRect(px, bY + 12, 3, 10 - sneakCrouch/2, C.playerShirt);
  drawPixelRect(px + w - 3, bY + 12, 3, 10 - sneakCrouch/2, C.playerShirt);
  drawPixelRect(px, bY + 21 - sneakCrouch/2, 3, 3, C.playerSkin);
  drawPixelRect(px + w - 3, bY + 21 - sneakCrouch/2, 3, 3, C.playerSkin);

  if (player.facing === 'down' || player.facing === 'left') {
    drawPixelRect(px - 2, bY + 20 - sneakCrouch/2, 5, 5, '#fff');
    drawPixelRect(px - 1, bY + 21 - sneakCrouch/2, 3, 3, '#eee');
  }

  if (player.sneaking) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px monospace';
    ctx.fillText('shh', px + w/2 - 8, bY - 10);
  }

  ctx.fillStyle = 'rgba(255,215,0,0.7)';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BRAYDEN', px + w/2, bY - 8);
  ctx.textAlign = 'left';

  if (game.isWorking) {
    ctx.fillStyle = 'rgba(100, 200, 255, 0.6)';
    ctx.font = 'bold 10px monospace';
    const dots = '.'.repeat((Math.floor(game.frameCount / 15) % 3) + 1);
    ctx.fillText('Working' + dots, px - 8, bY - 14);
  }

  ctx.globalAlpha = 1;
}

function drawNPC(npc) {

  ctx.fillStyle = C.shadow;

// --- ENEMY RENDERING ---


function drawEnemy(enemy) {
  if (enemy.dead) return;
  const x = enemy.x, y = enemy.y, w = T * 0.7, h = T * 0.8;
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.1)';
  ctx.beginPath();
  ctx.arc(x + w/2, y + h/2, enemy.range, 0, Math.PI * 2);
  ctx.stroke();

  if (enemy.distracted) {
    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
    ctx.font = '14px monospace';
    ctx.fillText('?', x + w/2 - 3, y - 8);
  }

  if (enemy.hp < enemy.maxHp) {
    const hpRatio = enemy.hp / enemy.maxHp;
    drawPixelRect(x, y - 6, w, 4, '#333');
    drawPixelRect(x + 1, y - 5, (w - 2) * hpRatio, 2, hpRatio > 0.5 ? '#4a4' : '#a44');
  }

  const bob = Math.sin(game.frameCount * 0.08 + enemy.x * 0.1) * 2;

  if (enemy.type === 'zombie') {
    const skinCol = '#d8c8b0', hairCol = '#6a5a3a', shirtCol = '#7a7a8a', trouserCol = '#4a4a4a';
    drawPixelRect(x + 3, y + h - 4 + bob, 8, 5, '#3a2a1a');
    drawPixelRect(x + w - 11, y + h - 4 + bob, 8, 5, '#3a2a1a');
    drawPixelRect(x + 4, y + h - 13 + bob, 7, 11, trouserCol);
    drawPixelRect(x + w - 11, y + h - 13 + bob, 7, 11, trouserCol);
    drawPixelRect(x + 2, y + 10 + bob, w - 4, h - 25, shirtCol);
    drawPixelRect(x + 4, y + h - 15 + bob, 5, 3, '#8a8a9a');
    drawPixelRect(x + 5, y + bob, w - 10, 14, skinCol);
    drawPixelRect(x + 4, y + bob - 3, w - 8, 6, hairCol);
    drawPixelRect(x + 3, y + bob - 1, 4, 4, hairCol);
    drawPixelRect(x + w - 7, y + bob - 2, 4, 5, hairCol);
    drawPixelRect(x + 7, y + 5 + bob, 4, 4, '#fff');
    drawPixelRect(x + w - 11, y + 5 + bob, 4, 4, '#fff');
    drawPixelRect(x + 8, y + 6 + bob, 2, 2, '#222');
    drawPixelRect(x + w - 10, y + 6 + bob, 2, 2, '#222');
    drawPixelRect(x + 7, y + 9 + bob, 4, 2, '#b0a090');
    drawPixelRect(x + w - 11, y + 9 + bob, 4, 2, '#b0a090');
    drawPixelRect(x + 10, y + 11 + bob, 5, 2, '#8a6a5a');
    drawPixelRect(x - 3, y + 12 + bob, 6, 4, shirtCol);
    drawPixelRect(x + w - 3, y + 12 + bob, 6, 4, shirtCol);
    drawPixelRect(x - 5, y + 12 + bob, 3, 3, skinCol);
    drawPixelRect(x + w + 1, y + 12 + bob, 3, 3, skinCol);
  } else {
    let col = enemy.type === 'hr' ? '#6a2a6a' : enemy.type === 'chatty' ? '#3a6a3a' : '#3a3a6a';
    drawPixelRect(x + 4, y + h - 10 + bob, 6, 10, '#3a3a4a');
    drawPixelRect(x + w - 10, y + h - 10 + bob, 6, 10, '#3a3a4a');
    drawPixelRect(x + 2, y + 10 + bob, w - 4, h - 22, col);
    drawPixelRect(x + 4, y + bob, w - 8, 14, '#f0c8a0');
    drawPixelRect(x + 4, y + bob, w - 8, 5, '#5a3a1a');
    drawPixelRect(x + 7, y + 6 + bob, 3, 3, '#222');
    drawPixelRect(x + w - 10, y + 6 + bob, 3, 3, '#222');
  }

  ctx.fillStyle = 'rgba(180, 40, 40, 0.8)';
  ctx.font = 'bold 9px monospace';
  const nw = ctx.measureText(enemy.name).width;
  ctx.fillText(enemy.name, x + w/2 - nw/2, y - 8);
}



function drawItem(item) {
  if (item.collected) return;
  const x = item.x, y = item.y;
  const floatY = Math.sin(game.frameCount * 0.06 + item.x) * 3;
  const glowAlpha = Math.sin(game.frameCount * 0.08) * 0.2 + 0.3;
  ctx.fillStyle = `rgba(255, 215, 0, ${glowAlpha})`;
  ctx.beginPath();
  ctx.arc(x + 12, y + 12 + floatY, 16, 0, Math.PI * 2);
  ctx.fill();
  const ix = x + 2, iy = y + 2 + floatY;

  if (item.type === 'headphones') {
    drawPixelRect(ix + 2, iy + 4, 16, 3, '#333');
    drawPixelRect(ix + 2, iy + 4, 4, 12, '#444');
    drawPixelRect(ix + 14, iy + 4, 4, 12, '#444');
  } else if (item.type === 'coffee') {
    drawPixelRect(ix + 4, iy + 2, 12, 16, '#8a5a2a');
    drawPixelRect(ix + 6, iy + 4, 8, 6, '#4a2a0a');
  }

  const dist = Math.hypot(player.x - item.x, player.y - item.y);
  if (dist < T * 1.5) {
    const pulse = Math.sin(game.frameCount * 0.1) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
    ctx.font = 'bold 10px monospace';
    ctx.fillText('[E] ' + item.name, x - 10, y - 8 + floatY);
  }
}

function drawUI() {
  drawPixelRect(0, 0, canvas.width, 52, C.uiBg);

  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(rooms[game.currentRoom].name, 8, 13);

  const timeMin = Math.floor(game.time / 60);
  const timeSec = Math.floor(game.time % 60);
  const timeColor = game.time < 60 ? '#ff4444' : game.time < 120 ? '#ffaa44' : '#ffdd44';
  ctx.fillStyle = timeColor;
  ctx.font = 'bold 12px monospace';
  ctx.fillText(`TIME ${timeMin}:${timeSec.toString().padStart(2, '0')}`, canvas.width - 110, 13);
  const timeRatio = game.time / game.maxTime;
  drawPixelRect(canvas.width - 112, 17, 104, 6, '#333');
  drawPixelRect(canvas.width - 110, 18, 100 * timeRatio, 4, timeColor);

  ctx.fillStyle = '#aaa'; ctx.font = '9px monospace';
  ctx.fillText('SNEAK', 8, 28);
  const stamRatio = player.stamina / player.maxStamina;
  drawPixelRect(48, 21, 82, 8, '#333');
  drawPixelRect(49, 22, 80 * stamRatio, 6, stamRatio > 0.3 ? C.stamina : C.staminaLow);

  const workRatio = game.workMeter / game.maxWork;
  const workColor = workRatio >= (game.workThreshold / game.maxWork) ? '#4a9a4a' : C.workMeter;
  ctx.fillStyle = '#aaa';
  ctx.fillText('WORK', 140, 28);
  drawPixelRect(174, 21, 82, 8, '#333');
  drawPixelRect(175, 22, 80 * workRatio, 6, workColor);
  const threshX = 175 + 80 * (game.workThreshold / game.maxWork);
  drawPixelRect(threshX - 1, 19, 2, 12, '#ffd700');

  if (game.currentRoom === 'office') {
    ctx.fillStyle = game.officeDoorUnlocked ? '#4a4' : '#a66';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(game.officeDoorUnlocked ? 'DOOR OPEN' : 'DOOR LOCKED', 140, 13);
  }

  const toiletRatio = game.toiletMeter / game.maxToilet;
  const toiletColor = toiletRatio > 0.7 ? C.toiletMeterHigh : C.toiletMeter;
  ctx.fillStyle = '#aaa';
  ctx.fillText('TOILET', 266, 28);
  drawPixelRect(306, 21, 82, 8, '#333');
  drawPixelRect(307, 22, 80 * toiletRatio, 6, toiletColor);
  if (toiletRatio > 0.8 && game.frameCount % 30 < 15) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('URGENT!!', 266, 13);
  }

  if (game.saltAmmo > 0) {
    ctx.fillStyle = '#eee';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(`SALT: ${game.saltAmmo}/${game.saltMax} [SPACE]`, 8, 42);
  }

  drawPixelRect(canvas.width / 2 - 60, canvas.height - 44, 120, 40, C.uiBg);
  ctx.strokeStyle = C.uiBorder;
  ctx.strokeRect(canvas.width / 2 - 60, canvas.height - 44, 120, 40);
  for (let i = 0; i < 2; i++) {
    const slotX = canvas.width / 2 - 54 + i * 58, slotY = canvas.height - 40;
    drawPixelRect(slotX, slotY, 50, 32, '#2a2a2a');
    ctx.strokeStyle = '#555';
    ctx.strokeRect(slotX, slotY, 50, 32);
    ctx.fillStyle = '#666'; ctx.font = '9px monospace';
    ctx.fillText(`[${i + 1}]`, slotX + 2, slotY + 10);
    if (player.inventory[i]) {
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold 9px monospace';
      const sn = player.inventory[i].name;
      ctx.fillText(sn.length > 8 ? sn.substring(0, 7) + '.' : sn, slotX + 2, slotY + 24);
    }
  }

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px monospace';
  ctx.fillText('WASD:Move  SHIFT:Sneak  E:Interact  1/2:Use Item  SPACE:Salt', 8, canvas.height - 6);

  // Free roam quest tracker
  if (game.mode === 'freeroam') {
    // Gold display
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 11px monospace';
    ctx.fillText('Work Points: ' + game.gold, canvas.width - 150, 20);

    // Active quest
    if (game.activeQuest && !game.activeQuest.completed) {
      const q = game.activeQuest;
      drawPixelRect(canvas.width - 220, 30, 210, 40, 'rgba(0,0,0,0.7)');
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold 9px monospace';
      ctx.fillText('QUEST: ' + q.name, canvas.width - 214, 44);
      ctx.fillStyle = '#ccc'; ctx.font = '9px monospace';
      ctx.fillText('Find: ' + q.itemNeeded.replace(/_/g, ' '), canvas.width - 214, 58);
    }

    // Quest completion count
    const done = game.quests.filter(q => q.completed).length;
    ctx.fillStyle = '#aaa'; ctx.font = '9px monospace';
    ctx.fillText('Quests: ' + done + '/' + game.quests.length, canvas.width - 150, canvas.height - 10);
  }
}

function drawFridgeMenu() {

  ctx.strokeRect(canvas.width/2 - 150, 100, 300, 300);

  ctx.textAlign = 'center';
  ctx.fillStyle = C.fridgeLight;
  ctx.font = 'bold 18px monospace';

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('W/S to browse, E to take, ESC to close', canvas.width/2, 150);

  const items = game.fridgeItems;
  for (let i = 0; i < items.length; i++) {
    const info = FRIDGE_ITEM_INFO[items[i]];
    const yPos = 180 + i * 60;

    if (selected) {
      drawPixelRect(canvas.width/2 - 130, yPos - 10, 260, 50, 'rgba(255,215,0,0.15)');

      ctx.strokeRect(canvas.width/2 - 130, yPos - 10, 260, 50);

    ctx.fillStyle = selected ? '#ccc' : '#666';
    ctx.font = '10px monospace';
    ctx.fillText(info.desc, canvas.width/2, yPos + 24);
  }

  ctx.textAlign = 'left';
}

// --- VENDOR MENU ---
function drawVendorMenu() {
  const mx = 100, my = 80, mw = canvas.width - 200, mh = 380;
  drawPixelRect(mx, my, mw, mh, 'rgba(0, 0, 0, 0.92)');
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, mw, mh);
  ctx.lineWidth = 1;

  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText("KUNAL'S SHOP", canvas.width / 2, my + 24);
  ctx.fillStyle = '#aaa'; ctx.font = '11px monospace';
  ctx.fillText('Work Points: ' + game.gold, canvas.width / 2, my + 42);
  ctx.textAlign = 'left';

  const items = game.vendorItems;
  for (let i = 0; i < items.length; i++) {
    const iy = my + 60 + i * 44;
    const selected = i === game.vendorMenuIndex;
    if (selected) {
      drawPixelRect(mx + 10, iy - 4, mw - 20, 40, 'rgba(255, 215, 0, 0.12)');
      ctx.strokeStyle = '#ffd700';
      ctx.strokeRect(mx + 10, iy - 4, mw - 20, 40);
    }
    const canAfford = game.gold >= items[i].cost;
    ctx.fillStyle = selected ? '#fff' : '#aaa'; ctx.font = 'bold 13px monospace';
    ctx.fillText((selected ? '> ' : '  ') + items[i].name, mx + 20, iy + 12);
    ctx.fillStyle = canAfford ? '#4a9a4a' : '#aa4444'; ctx.font = '11px monospace';
    ctx.fillText('Cost: ' + items[i].cost + ' pts', mx + 240, iy + 12);
    ctx.fillStyle = '#888'; ctx.font = '10px monospace';
    ctx.fillText(items[i].desc, mx + 20, iy + 28);
  }

  ctx.fillStyle = '#666'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('[W/S] Browse  |  [E/Enter] Buy  |  [ESC] Close', canvas.width / 2, my + mh - 12);
  ctx.textAlign = 'left';
}

// --- DIALOGUE ---
function drawDialogue() {
  if (!game.currentDialogue) return;
  const boxH = 100, boxY = canvas.height - boxH - 50;
  drawPixelRect(20, boxY, canvas.width - 40, boxH, 'rgba(0,0,0,0.9)');
  ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
  ctx.strokeRect(20, boxY, canvas.width - 40, boxH);
  ctx.lineWidth = 1;

  ctx.fillStyle = '#eee'; ctx.font = '13px monospace';
  const maxWidth = canvas.width - 80;
  const words = game.currentDialogue.split(' ');
  let line = '', lineY = boxY + 25;
  for (const word of words) {
    const testLine = line + word + ' ';
    if (ctx.measureText(testLine).width > maxWidth) {
      ctx.fillText(line, 40, lineY); line = word + ' '; lineY += 18;
    } else line = testLine;
  }
  ctx.fillText(line, 40, lineY);

  if (game.frameCount % 40 < 25) {
    ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
    ctx.fillText('Press [E] or [SPACE] to continue...', 40, boxY + boxH - 12);
  }
}



function startGame() {
  game.state = 'playing';
  game.currentRoom = 'office';
  game.time = game.maxTime;
  game.workMeter = 0;
  game.toiletMeter = 0;
  game.officeDoorUnlocked = false;
  game.isWorking = false;
  game.saltAmmo = 0;
  game.saltProjectiles = [];
  game.fridgeItems = ['salt', 'beer', 'energy_drink'];
  game.fridgeMenuIndex = 0;
  game.energyDrinkWorkTimer = 0;
  game.energyDrinkToiletTimer = 0;
  game.npcMenuOptions = [];
  game.npcMenuIndex = 0;
  game.npcMenuTarget = null;

  const start = rooms.office.playerStart;
  player.x = start.x; player.y = start.y;
  player.stamina = player.maxStamina;
  player.inventory = game.level === 3 ? [null, null, null, null] : [null, null];
  player._coffeeBoost = 0;
  player._headphoneTimer = 0;
  player.isHiding = false;
  player.imodiumTimer = 0;

  game.paperBalls = [];
  game.randomEventTimer = 30;
  game.currentEvent = null;
  game.emailNotifications = [];
  game.emailTimer = 20;
  game.deliveryDriverMoved = false;
  game.occupiedCubicle = -1;
  game.speechBubbles = [];
  game.quipTimer = 0;

  for (const roomKey in rooms) {
    const r = rooms[roomKey];
    if (r.items) r.items.forEach(i => i.collected = false);
    if (r.enemies) r.enemies.forEach(e => {
      e.patrolIndex = 0; e.alerted = false;
      e.distracted = false; e.distractTimer = 0;
      e.hp = e.maxHp; e.dead = false;
      if (e.startX !== undefined) { e.x = e.startX; e.y = e.startY; }
    });
    if (r.npcs) r.npcs.forEach(n => {
      if (n.originX !== undefined) {
        n.x = n.originX; n.y = n.originY;
      }
      if (n.roaming) { n.roamTarget = null; n.roamTimer = 0; }
      if (n.chasePlayer !== undefined) n.chasePlayer = true;
      if (n.sleeping !== undefined) n.sleeping = true;
      if (n.interacted !== undefined) n.interacted = false;
      if (n.storyActive !== undefined) n.storyActive = false;
      if (n.catchCooldown !== undefined) n.catchCooldown = 0;
    });
  }
  if (rooms.lobby.npcs) {
    rooms.lobby.npcs.forEach(n => {
      if (n.interactType === 'kunal_lobby') n.sleeping = true;
      if (n.interactType === 'lax_lobby') n.chasePlayer = true;
    });
  }

  // Configure door routing based on level
  if (game.level === 1) {
    // Level 1: Office → Lobby → Toilet Area (3 rooms)
    // Lobby top door goes straight to toiletArea
    rooms.lobby.doors[1] = { x: 13, y: 0, toRoom: 'toiletArea', toX: 7, toY: 9, label: 'To the Toilets!' };
    // toiletArea back door goes to lobby
    rooms.toiletArea.doors[0] = { x: 7, y: 9, toRoom: 'lobby', toX: 13, toY: 1, label: 'Back to Communal Area' };
  } else if (game.level === 2) {
    // Level 2: Office → Lobby → Toilet Hall → Stairwell → Toilet Area (5 rooms)
    rooms.lobby.doors[1] = { x: 13, y: 0, toRoom: 'toiletHall', toX: 7, toY: 10, label: 'Toilet Hallway' };
    rooms.toiletArea.doors[0] = { x: 7, y: 9, toRoom: 'stairwell', toX: 7, toY: 9, label: 'Back to Stairwell' };
  } else if (game.level === 3) {
    game.mode = 'freeroam';
    game.time = 9999; // no time pressure
    game.toiletRiseRate = 0; // no toilet urgency
    game.maxTime = 9999;
    game.officeDoorUnlocked = true; // doors always open
    game.gold = 0;

    // Set up door routing - lobby connects to pub via exit
    rooms.lobby.doors[1] = { x: 13, y: 0, toRoom: 'toiletHall', toX: 7, toY: 10, label: 'Toilet Hallway' };

    // toiletHall exit door leads to pub instead of game over

    // Remove sleeping behavior from all Kunals - he's a vendor in free roam
    for (const roomKey in rooms) {
      const r = rooms[roomKey];
      if (r.npcs) r.npcs.forEach(n => {
        if (n.sleeping) n.sleeping = false;
      });

    // Set up quests
    game.quests = [
      { id: 'coffee_run', name: "Karin's Coffee Run", description: 'Find Coffee and bring it to Karin', itemNeeded: 'coffee', giver: 'Karin', completed: false, reward: 20, rewardDesc: '+20 Work Points' },

      { id: 'beer_mat', name: "Rebecca's Collection", description: 'Find the rare Beer Mat in the pub', itemNeeded: 'beer_mat', giver: 'Rebecca', completed: false, reward: 20, rewardDesc: '+20 Work Points' },
      { id: 'imodium_quest', name: "Karin's Emergency", description: 'Find Imodium for Karin (she ate the curry too)', itemNeeded: 'imodium', giver: 'Karin', completed: false, reward: 35, rewardDesc: '+35 Work Points' },
      { id: 'dart_quest', name: "Rebecca's Darts Night", description: 'Get a Dart from the pub for tonight', itemNeeded: 'dart', giver: 'Rebecca', completed: false, reward: 15, rewardDesc: '+15 Work Points' },
    ];
    game.activeQuest = null;

    // Add Karin and Rebecca NPCs to office
    rooms.office.npcs.push(
      { x: 1 * T, y: 3 * T, name: 'Karin', type: 'coworker', interactType: 'karin_quest',
        roaming: false, originX: 1 * T, originY: 3 * T, sprite: 'karin',

      { x: 1 * T, y: 7 * T, name: 'Rebecca', type: 'coworker', interactType: 'rebecca_quest',
        roaming: false, originX: 1 * T, originY: 7 * T, sprite: 'rebecca',
        dialogue: ["Rebecca: Oh Brayden, perfect timing! I need a favour..."] }

    // Change office Kunal to vendor
    rooms.office.npcs.forEach(n => {
      if (n.name === 'Kunal') {

        n.dialogue = ["Kunal: Yo! Want to buy something? I accept work progress as payment."];

    );

}

function resetGame() { game.state = 'title'; game.levelSelectIndex = game.level - 1; }

function isNearComputer() {
  if (game.currentRoom !== 'office') return false;
  const room = rooms.office;
  const pgx = Math.floor((player.x + player.w / 2) / T);
  const pgy = Math.floor((player.y + player.h / 2) / T);
  for (let oy = -1; oy <= 1; oy++) {
    for (let ox = -1; ox <= 1; ox++) {
      const tx = pgx + ox, ty = pgy + oy;
      if (ty >= 0 && ty < ROWS && tx >= 0 && tx < COLS) {
        if (room.grid[ty][tx] === TILE_MONITOR) return true;
      }
    }
  }
  return false;
}

function isNearFridge() {
  if (game.currentRoom !== 'office') return false;
  const fridgeX = 1 * T + T/2, fridgeY = 6 * T + T/2;
  return Math.hypot(player.x + player.w/2 - fridgeX, player.y + player.h/2 - fridgeY) < T * 1.8;
}

function getNearestDesk() {
  const room = rooms[game.currentRoom];
  let nearest = null, minDist = Infinity;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (room.grid[y][x] === TILE_DESK || room.grid[y][x] === TILE_COPIER) {
        const dx = player.x + player.w/2 - (x * T + T/2);
        const dy = player.y + player.h/2 - (y * T + T/2);
        const dist = Math.hypot(dx, dy);
        if (dist < T * 1.8 && dist < minDist) { nearest = {x: x*T, y: y*T}; minDist = dist; }
      }
    }
  }
  return nearest;
}

function toggleHiding() {
  if (player.isHiding) {
    player.isHiding = false;
    return;
  }
  const desk = getNearestDesk();
  if (desk) {
    player.isHiding = true;
    player.x = desk.x + T/2 - player.w/2;
    player.y = desk.y + T/2 - player.h/2;
  }
}

function throwPaperBall() {
  const dirs = { up: {dx:0,dy:-1}, down: {dx:0,dy:1}, left: {dx:-1,dy:0}, right: {dx:1,dy:0} };
  const d = dirs[player.facing] || dirs.down;
  game.paperBalls.push({
    x: player.x + player.w/2, y: player.y + player.h/2,
    dx: d.dx * 4, dy: d.dy * 4, timer: 1.5, landed: false,
    landX: 0, landY: 0, distractTimer: 4
  });
}

function updatePaperBalls(dt) {
  const room = rooms[game.currentRoom];
  for (let i = game.paperBalls.length - 1; i >= 0; i--) {
    const pb = game.paperBalls[i];
    if (!pb.landed) {
      pb.x += pb.dx; pb.y += pb.dy;
      pb.timer -= dt;
      // Check wall collision
      const tx = Math.floor(pb.x / T), ty = Math.floor(pb.y / T);
      if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS || isSolid(room.grid[ty]?.[tx])) {
        pb.landed = true; pb.landX = pb.x; pb.landY = pb.y;
      }
      if (pb.timer <= 0) { pb.landed = true; pb.landX = pb.x; pb.landY = pb.y; }
    } else {
      pb.distractTimer -= dt;
      // Distract nearby enemies
      if (room.enemies) {
        for (const e of room.enemies) {
          if (e.dead) continue;
          const dist = Math.hypot(e.x - pb.landX, e.y - pb.landY);
          if (dist < T * 5) {
            e.distracted = true; e.distractTimer = Math.max(e.distractTimer, pb.distractTimer);
            e.distractX = pb.landX; e.distractY = pb.landY;
          }
        }
      }
      if (pb.distractTimer <= 0) game.paperBalls.splice(i, 1);
    }
  }
}

function drawPaperBalls() {
  for (const pb of game.paperBalls) {
    ctx.fillStyle = '#d4c8a0';
    ctx.beginPath();
    const px = pb.landed ? pb.landX : pb.x;
    const py = pb.landed ? pb.landY : pb.y;
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
    if (pb.landed) {
      // Noise rings
      const alpha = pb.distractTimer / 4;
      ctx.strokeStyle = `rgba(255, 200, 100, ${alpha * 0.4})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px, py, (4 - pb.distractTimer) * 15, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function updatePlayer(dt) {
  if (game.state !== 'playing') return;

  if (keys['e'] && isNearComputer() && !game.officeDoorUnlocked) {
    game.isWorking = true;
    const workRate = game.energyDrinkWorkTimer > 0 ? game.workFillRate * 3 : game.workFillRate;
    game.workMeter = Math.min(game.maxWork, game.workMeter + workRate * dt);
    // Rotate funny work task descriptions
    game.workTaskTimer -= dt;
    if (game.workTaskTimer <= 0 || !game.workTask) {
      game.workTaskTimer = 1.8 + Math.random() * 2;
      const tasks = [
        'Updating spreadsheet nobody reads...',
        'Replying all to a chain of 47 emails...',
        'Renaming final_v2_FINAL_actual.docx...',
        'Attending meeting that could\'ve been an email...',
        'Filling in timesheet... creatively...',
        'Writing passive-aggressive Slack message...',
        'Pretending to understand the Jira board...',
        'Moving tickets to "In Progress"...',
        'Googling error message on Stack Overflow...',
        'Nodding along in standup...',
        'Copy-pasting from ChatGPT...',
        'Making the logo bigger...',
        'Clearing 200 unread notifications...',
        'Submitting expense report from 6 months ago...',
        'Restarting computer for the 3rd time...',
        'Watching progress bar... watching you...',
        'Doing "synergy" on the "deliverables"...',
        'Aligning boxes in PowerPoint...',
        'Pretending VPN works...',
        'Deleting emails without reading them...',
        'Writing unit tests... LOL just kidding...',
        'Calculating how long until lunch...',
        'Staring at code you wrote last Friday...',
        'Wondering who approved this codebase...',
      ];
      game.workTask = tasks[Math.floor(Math.random() * tasks.length)];
    }
    if (game.workMeter >= game.workThreshold && !game.officeDoorUnlocked) {
      game.officeDoorUnlocked = true;
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "You've done enough work! The office door is now UNLOCKED. Time to make your escape to the toilet...";
    }
    player.walking = false;
    return;
  }
  game.isWorking = false;

  if (player.isHiding) {
    player.walking = false;
    return;
  }

  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) { dy = -1; player.facing = 'up'; }
  if (keys['s'] || keys['arrowdown']) { dy = 1; player.facing = 'down'; }
  if (keys['a'] || keys['arrowleft']) { dx = -1; player.facing = 'left'; }
  if (keys['d'] || keys['arrowright']) { dx = 1; player.facing = 'right'; }
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  player.walking = dx !== 0 || dy !== 0;
  player.sneaking = keys['shift'] && player.stamina > 0;
  if (player.sneaking && player.walking) {
    player.stamina = Math.max(0, player.stamina - player.staminaDrain * dt);
  } else if (!player.sneaking) {
    player.stamina = Math.min(player.maxStamina, player.stamina + player.staminaRegen * dt);
  }

  const speed = player.sneaking ? player.sneakSpeed : player.speed;
  const actualSpeed = player._coffeeBoost > 0 ? speed * 1.8 : speed;
  const nx = player.x + dx * actualSpeed * SCALE;
  const ny = player.y + dy * actualSpeed * SCALE;
  if (canMoveTo(nx, player.y, player.w, player.h)) player.x = nx;
  if (canMoveTo(player.x, ny, player.w, player.h)) player.y = ny;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  if (player._coffeeBoost > 0) player._coffeeBoost -= dt;
  if (player._headphoneTimer > 0) player._headphoneTimer -= dt;

  player.canInteract = null;
  const room = rooms[game.currentRoom];

  if (isNearFridge() && game.fridgeItems.length > 0) {
    player.canInteract = { type: 'fridge' };
  }

  if (isNearComputer() && !game.officeDoorUnlocked) {
    player.canInteract = { type: 'computer' };
  }

  for (const door of room.doors) {
    const doorX = door.x * T + T / 2, doorY = door.y * T + T / 2;
    const dist = Math.hypot(player.x + player.w / 2 - doorX, player.y + player.h / 2 - doorY);
    if (dist < T * 1.5) {
      if (door.locked && !game.officeDoorUnlocked) {
        player.canInteract = { type: 'lockedDoor', data: door };
      } else {
        player.canInteract = { type: 'door', data: door };
      }
    }
  }

  if (room.npcs) {
    for (const npc of room.npcs) {
      const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
      if (dist < T * 1.8) player.canInteract = { type: 'npc', data: npc };
    }
  }

  if (room.items) {
    for (const item of room.items) {
      if (item.collected) continue;
      const dist = Math.hypot(player.x - item.x, player.y - item.y);
      if (dist < T * 1.5) player.canInteract = { type: 'item', data: item };
    }
  }

  if (room.winTiles) {
    for (const wt of room.winTiles) {
      const wtx = wt.x * T, wty = wt.y * T;
      if (Math.hypot(player.x + player.w/2 - wtx - T/2, player.y + player.h/2 - wty - T/2) < T) {
        game.state = 'win';
        return;
      }
    }
  }
}

function moveEnemyTowardTarget(enemy, targetX, targetY, maxSpeed) {
  const dx = targetX - enemy.x, dy = targetY - enemy.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 2) {
    const speed = Math.min(maxSpeed, dist);
    enemy.x += (dx / dist) * speed;
    enemy.y += (dy / dist) * speed;
    // Try sliding along walls
    if (!canMoveTo(enemy.x, enemy.y, T * 0.7, T * 0.8)) {
      enemy.x -= (dx / dist) * speed;
      if (canMoveTo(enemy.x, enemy.y + (dy / dist) * speed, T * 0.7, T * 0.8)) {
        enemy.y += (dy / dist) * speed;
      } else {
        enemy.y -= (dy / dist) * speed;
        if (canMoveTo(enemy.x + (dx / dist) * speed, enemy.y, T * 0.7, T * 0.8)) {
          enemy.x += (dx / dist) * speed;
        }
      }
    }
  }
}

function updateEnemies(dt) {
  const room = rooms[game.currentRoom];
  if (!room.enemies) return;

  if (game.currentEvent?.type === 'fireDrill') {
    for (const enemy of room.enemies) {
      if (!enemy.dead) enemy.alerted = false;
    }
    return;
  }

  for (const enemy of room.enemies) {
    if (enemy.dead) continue;
    if (enemy.distracted) {
      enemy.distractTimer -= dt;
      if (enemy.distractTimer <= 0) enemy.distracted = false;
      // Move toward distraction
      if (enemy.distractX !== undefined && enemy.distractY !== undefined) {
        const dist = Math.hypot(enemy.distractX - enemy.x, enemy.distractY - enemy.y);
        if (dist > 4) {
          const speed = enemy.speed * SCALE * 0.3;
          moveEnemyTowardTarget(enemy, enemy.distractX, enemy.distractY, speed);
        }
      }
      continue;
    }

    if (enemy.type === 'zombie') {
      const playerDist = Math.hypot(
        player.x + player.w / 2 - enemy.x - T * 0.35,
        player.y + player.h / 2 - enemy.y - T * 0.4
      );

      if (game.isWorking) {
        continue;
      }

      const isInteracting = game.state === 'interact' || game.state === 'npcMenu' || game.state === 'fridgeMenu';
      if (isInteracting) {
        const cdx = player.x - enemy.x, cdy = player.y - enemy.y;
        const cdist = Math.hypot(cdx, cdy);
        if (cdist > 0 && cdist < T * 8) {
          const retreatSpeed = enemy.speed * SCALE * 0.2;
          moveEnemyTowardTarget(enemy, enemy.x - (cdx / cdist) * T * 4, enemy.y - (cdy / cdist) * T * 4, retreatSpeed);
        }
        continue;
      }

      // Check if player is hiding and invisible via headphones
      if (player.isHiding && player._headphoneTimer > 0) {
        // Enemy can't detect hiding player, roam randomly instead
        if (!enemy.roamTarget || Math.hypot(enemy.x - enemy.roamTarget.x, enemy.y - enemy.roamTarget.y) < 4) {
          enemy.roamTarget = {
            x: Math.random() * (14 * T - 4 * T) + 4 * T,
            y: Math.random() * (10 * T - 3 * T) + 3 * T
          };
        }
        const dist = Math.hypot(enemy.roamTarget.x - enemy.x, enemy.roamTarget.y - enemy.y);
        if (dist > 4) {
          const speed = enemy.speed * SCALE * 0.3;
          moveEnemyTowardTarget(enemy, enemy.roamTarget.x, enemy.roamTarget.y, speed);
        }
        continue;
      }

      const cdx = player.x - enemy.x, cdy = player.y - enemy.y;
      const cdist = Math.hypot(cdx, cdy);
      if (cdist > 0) {
        const zombieSpeed = enemy.speed * SCALE * 0.3;
        moveEnemyTowardTarget(enemy, player.x, player.y, zombieSpeed);
      }

      if (playerDist < T * 0.7) {
        if (game.mode === 'freeroam') {
          game.currentRoom = 'pub';
          player.x = 7 * T; player.y = 9 * T;
          game.state = 'interact';
          game.dialogueQueue = ["Andrew dragged you to the pub! 'Just one pint!'", "*You're now at the pub. Find the door to get back!*"];
          game.currentDialogue = game.dialogueQueue.shift();
        } else {
          game.state = 'pub';
          game.gameOverReason = enemy.caught;
        }
      }
      continue;
    }

    if (!enemy.patrolIndex) enemy.patrolIndex = 0;
    const target = enemy.patrol[enemy.patrolIndex];
    const edx = target.x - enemy.x, edy = target.y - enemy.y;
    const edist = Math.hypot(edx, edy);
    if (edist < 4) {
      enemy.patrolIndex = (enemy.patrolIndex + 1) % enemy.patrol.length;
    } else {
      enemy.x += (edx / edist) * enemy.speed * SCALE * 0.5;
      enemy.y += (edy / edist) * enemy.speed * SCALE * 0.5;
    }

    const playerDist = Math.hypot(
      player.x + player.w / 2 - enemy.x - T * 0.35,
      player.y + player.h / 2 - enemy.y - T * 0.4
    );
    const detectionRange = player.sneaking ? enemy.range * 0.4 : enemy.range;
    const invisible = player._headphoneTimer > 0;

    if (playerDist < detectionRange && !invisible) {
      enemy.alerted = true;
      const cdx = player.x - enemy.x, cdy = player.y - enemy.y;
      const cdist = Math.hypot(cdx, cdy);
      if (cdist > 0) {
        enemy.x += (cdx / cdist) * enemy.speed * SCALE * 0.8;
        enemy.y += (cdy / cdist) * enemy.speed * SCALE * 0.8;
      }
      if (playerDist < T * 0.6) {
        game.state = 'pub';
        game.gameOverReason = enemy.caught;
      }
    } else {
      enemy.alerted = false;
    }
  }
}

function updateNpcMovement(dt) {
  const room = rooms[game.currentRoom];
  if (!room.npcs) return;
  for (const npc of room.npcs) {
    if (npc.chasePlayer) {
      const dx = player.x - npc.x, dy = player.y - npc.y;
      const dist = Math.hypot(dx, dy);
      if (dist > T * 0.8) {
        const speed = (npc.chaseSpeed || 0.15) * SCALE;
        moveEnemyTowardTarget(npc, player.x, player.y, speed);
      }
    }
    if (npc.roaming && !npc.chasePlayer) {
      npc.roamTimer -= dt;
      if (npc.roamTimer <= 0 || !npc.roamTarget) {
        const minX = 2 * T, maxX = 14 * T;
        const minY = 3 * T, maxY = 10 * T;
        npc.roamTarget = {
          x: minX + Math.random() * (maxX - minX),
          y: minY + Math.random() * (maxY - minY),
        };
        npc.roamTimer = 4 + Math.random() * 5;
      }
      const dx = npc.roamTarget.x - npc.x, dy = npc.roamTarget.y - npc.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 4) {
        moveEnemyTowardTarget(npc, npc.roamTarget.x, npc.roamTarget.y, npc.roamSpeed * SCALE);
      }
    }
  }

  // Sleeping Kunal - sends player back to office (works in any room)
  for (const npc of room.npcs) {
    if (npc.sleeping) {
      const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
      if (dist < T * 1.5) {
        game.workMeter = 0;
        game.officeDoorUnlocked = false;
        game.currentRoom = 'office';
        const start = rooms.office.playerStart;
        player.x = start.x; player.y = start.y;
        game.state = 'interact';
        game.dialogueQueue = [
          "Kunal: *wakes up startled* BRAYDEN?! What are you doing here?!",
          "Kunal: You're supposed to be WORKING! Come on, back to the office.",
          "Kunal: *drags you back to your desk*",
          "*Your work meter has been reset to 0! Toilet meter unchanged.*",
        ];
        game.currentDialogue = game.dialogueQueue.shift();
        return;
      }
    }
  }

  if (game.currentRoom === 'lobby') {
    for (const npc of room.npcs) {
      if (npc.interactType === 'lax_lobby' && npc.chasePlayer) {
        const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
        if (dist < T * 0.8) {
          game.time = Math.max(0, game.time - 90);
          for (const k of room.npcs) {
            if (k.sleeping) k.sleeping = false;
          }
          game.state = 'interact';
          game.dialogueQueue = [
            "Lax: Bro you look hungry. *shoves sandwich in your face*",
            "Brayden: I don't have time for-",
            "Lax: Just eat. Trust me.",
            "*You ate Lax's sandwich. You lost 1:30 off the clock.*",
            "Kunal: *wakes up from the sofa* What's going on? ...FOOD?!",
            "*Kunal is now awake! Watch out...*",
          ];
          game.currentDialogue = game.dialogueQueue.shift();
          npc.chasePlayer = false;
          npc.x = npc.originX;
          npc.y = npc.originY;
          return;
        }
      }
    }
  }

  if (game.currentRoom === 'lobby') {
    for (const npc of room.npcs) {
      if (npc.interactType === 'boss_patrol') {
        npc.catchCooldown -= dt;
        if (npc.catchCooldown <= 0) {
          const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
          if (dist < npc.detectionRange && !player.isHiding && player._headphoneTimer <= 0) {
            game.time -= 120;
            game.workMeter = 0;
            game.officeDoorUnlocked = false;
            npc.catchCooldown = 30;
            game.state = 'interact';
            game.dialogueQueue = [...npc.dialogue];
            game.currentDialogue = game.dialogueQueue.shift();
            return;
          }
        }
      }
    }
  }

  if (game.currentRoom === 'toiletHall') {
    for (const npc of room.npcs) {
      if ((npc.interactType === 'kunal_hall' || npc.interactType === 'lax_hall') && npc.chasePlayer) {
        const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
        if (dist < T * 0.8) {
          game.state = 'pub';
          game.gameOverReason = `${npc.name} caught up to you in the hallway. "${npc.name === 'Kunal' ? "Come on mate, the pub's right there!" : "Bro just come with us, forget the toilet..."}" And just like that, you're at the pub.`;
          return;
        }
      }
      if (npc.interactType === 'karen_block' && !npc.interacted) {
        const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
        if (dist < npc.autoRange && !player.isHiding) {
          npc.interacted = true;
          game.time -= 30;
          game.state = 'interact';
          game.dialogueQueue = [...npc.dialogue];
          game.currentDialogue = game.dialogueQueue.shift();
          return;
        }
      }
      if (npc.interactType === 'greg_story' && !npc.storyActive) {
        const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
        if (dist < npc.autoRange && !player.isHiding) {
          npc.storyActive = true;
          game.time -= 30;
          game.state = 'interact';
          game.dialogueQueue = [...npc.dialogue];
          game.currentDialogue = game.dialogueQueue.shift();
          return;
        }
      }
    }
  }

  if (game.currentRoom === 'stairwell') {
    for (const npc of room.npcs) {
      if (npc.interactType === 'delivery_driver' && game.deliveryDriverMoved) {
        npc.x = 2 * T;
      }
    }
  }
}

function updateSaltProjectiles(dt) {
  const room = rooms[game.currentRoom];
  for (let i = game.saltProjectiles.length - 1; i >= 0; i--) {
    const p = game.saltProjectiles[i];
    p.x += p.dx * 6;
    p.y += p.dy * 6;
    p.life -= dt;

    if (room.enemies) {
      for (const enemy of room.enemies) {
        if (enemy.dead) continue;
        const dist = Math.hypot(p.x - enemy.x - T * 0.35, p.y - enemy.y - T * 0.4);
        if (dist < T * 0.5) {
          enemy.hp--;
          if (enemy.hp <= 0) {
            enemy.dead = true;
          } else {
            enemy.distracted = true;
            enemy.distractTimer = 1;
            enemy.alerted = false;
          }
          game.saltProjectiles.splice(i, 1);
          break;
        }
      }
    }

    if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
      game.saltProjectiles.splice(i, 1);
    }
  }
}

function updateTimers(dt) {
  if (game.state !== 'playing') return;

  game.time -= dt;
  if (game.time <= 0) {
    game.time = 0;
    game.state = 'pub';
    game.gameOverReason = "Time's up! You took too long and your bladder couldn't hold. Straight to the pub to drown your sorrows...";
  }

  if (game.energyDrinkWorkTimer > 0) {
    game.energyDrinkWorkTimer -= dt;
  }
  if (game.energyDrinkToiletTimer > 0) {
    game.energyDrinkToiletTimer -= dt;
  }

  if (player.imodiumTimer > 0) {
    player.imodiumTimer -= dt;
  }

  let toiletRate = game.energyDrinkToiletTimer > 0 ? game.toiletRiseRate * 3 : game.toiletRiseRate;
  if (player.imodiumTimer > 0) {
    toiletRate *= 0.3;
  }
  game.toiletMeter = Math.min(game.maxToilet, game.toiletMeter + toiletRate * dt);
  if (game.toiletMeter >= game.maxToilet) {
    game.state = 'pub';
    game.gameOverReason = "Your toilet meter hit 100%! You didn't make it in time... Embarrassed, you fled straight to the pub.";
  }
}

function fireSalt() {
  if (game.saltAmmo <= 0) return;
  game.saltAmmo--;
  let dx = 0, dy = 0;
  if (player.facing === 'up') dy = -1;
  else if (player.facing === 'down') dy = 1;
  else if (player.facing === 'left') dx = -1;
  else dx = 1;

  game.saltProjectiles.push({
    x: player.x + player.w / 2,
    y: player.y + player.h / 2,
    dx, dy,
    life: 1.5,
  });
}

function handleVendorBuy() {
  if (game.vendorItems.length === 0) return;
  const item = game.vendorItems[game.vendorMenuIndex];

  // Special handling for paper balls
  if (item.itemType === 'paper_balls') {
    if (game.gold >= item.cost) {
      game.gold -= item.cost;
      game.paperBallAmmo = (game.paperBallAmmo || 0) + 5;
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "Kunal: Here's 5 paper balls. Go cause some chaos!";
      return;
    } else {
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "Kunal: You can't afford that mate! Need " + item.cost + " work points, you've got " + game.gold + ".";
      return;
    }
  }

  if (game.gold >= item.cost) {
    game.gold -= item.cost;
    // Give player the item
    const emptySlot = player.inventory.indexOf(null);
    if (emptySlot !== -1) {
      player.inventory[emptySlot] = { name: item.name, itemType: item.itemType, type: 'pickup' };
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "Kunal: Nice doing business! Here's your " + item.name + ".";
    } else {
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "Your pockets are full! Use or drop an item first.";
    }
  } else {
    game.state = 'interact';
    game.dialogueQueue = [];
    game.currentDialogue = "Kunal: You can't afford that mate! Need " + item.cost + " work points, you've got " + game.gold + ".";
  }
}


function tryInteract() {
  if (!player.canInteract) return;
  const { type, data } = player.canInteract;

  if (type === 'fridge') {
    game.state = 'fridgeMenu';
    game.fridgeMenuIndex = 0;
    return;
  }

  if (type === 'computer') {
    // Don't open dialogue — holding E handles working directly in updatePlayer
    return;
  }

  if (type === 'lockedDoor') {
    game.state = 'interact';
    game.dialogueQueue = [];
    const pct = Math.floor(game.workMeter);
    game.currentDialogue = `The door is LOCKED! You need to do more work first. (${pct}/${game.workThreshold}%) Hold [E] near a computer to work.`;
    return;
  }

  if (type === 'door') {
    if (data.toRoom === 'pub_exit') {
      game.state = 'pub';
      game.gameOverReason = "You walked right out the building! Fresh air hit you and you thought... why not the pub? Your mates would be proud.";
      return;
    }
    game.currentRoom = data.toRoom;
    player.x = data.toX * T; player.y = data.toY * T;
    player.canInteract = null;
    // Set occupied cubicle when entering toiletArea (Level 2 only - one cubicle is occupied)
    if (data.toRoom === 'toiletArea') {
      if (game.level === 2) {
        const wt = rooms.toiletArea.winTiles;
        game.occupiedCubicle = Math.floor(Math.random() * wt.length);
      } else {
        game.occupiedCubicle = -1; // Level 1: all cubicles are available
      }
    }
    return;
  }

  if (type === 'npc') {
    if (data.interactType === 'kunal_menu') {
      game.state = 'npcMenu';
      game.npcMenuTarget = data;
      game.npcMenuIndex = 0;
      game.npcMenuOptions = [
        { label: 'Talk', desc: 'Have a chat (you two always end up arguing...)', action: 'kunal_talk' },
        { label: 'Go to the Pub', desc: 'Sod it, let\'s go to the pub', action: 'pub' },
      ];
      return;
    }
    if (data.interactType === 'lax_menu') {
      game.state = 'npcMenu';
      game.npcMenuTarget = data;
      game.npcMenuIndex = 0;
      game.npcMenuOptions = [
        { label: 'Talk', desc: 'Chat (Kunal always joins in...)', action: 'lax_talk' },
        { label: 'Tell Them to Work', desc: 'Maybe Lax has some advice...', action: 'lax_work' },
        { label: 'Go to the Pub', desc: 'Forget work, pub time', action: 'pub' },
      ];
      return;
    }
    if (data.interactType === 'kunal_lobby') {
      game.state = 'interact';
      game.dialogueQueue = ["Kunal: *snoring*... zzz..."];
      game.currentDialogue = game.dialogueQueue.shift();
      return;
    }
    if (data.interactType === 'lax_lobby') {
      game.state = 'interact';
      game.dialogueQueue = [
        "Lax: *holding sandwich* You want some?",
        "Brayden: I really don't have time-",
        "Lax: Just eat. You look pale.",
      ];
      game.currentDialogue = game.dialogueQueue.shift();
      return;
    }
    if (data.interactType === 'kunal_hall' || data.interactType === 'lax_hall') {
      game.state = 'pub';
      game.gameOverReason = `${data.name} convinced you to leave through the exit. "The pub's just round the corner!" And off you went...`;
      return;
    }
    if (data.interactType === 'delivery_driver') {
      game.deliveryDriverMoved = true;
      game.state = 'interact';
      game.dialogueQueue = [...data.dialogue];
      game.currentDialogue = game.dialogueQueue.shift();
      return;
    }
    if (data.interactType === 'boss_patrol') {
      game.state = 'pub';
      game.gameOverReason = "The boss caught you! 'My office. NOW.' ...off to the pub to drown your sorrows.";
      return;
    }
    if (data.interactType === 'karen_block') {
      if (!data.interacted) {
        data.interacted = true;
        game.time -= 30;
        game.state = 'interact';
        game.dialogueQueue = [...data.dialogue];
        game.currentDialogue = game.dialogueQueue.shift();
      }
      return;
    }
    if (data.interactType === 'greg_story') {
      if (!data.storyActive) {
        data.storyActive = true;
        game.time -= 30;
        game.state = 'interact';
        game.dialogueQueue = [...data.dialogue];
        game.currentDialogue = game.dialogueQueue.shift();
      }
      return;
    }

    // Free roam quest givers
    if (data.interactType === 'karin_quest' || data.interactType === 'rebecca_quest') {
      const giverName = data.interactType === 'karin_quest' ? 'Karin' : 'Rebecca';
      // Check if player has a quest item to turn in
      const turnInQuest = game.quests.find(q => !q.completed && q.giver === giverName &&
        player.inventory.some(inv => inv && inv.itemType === q.itemNeeded));
      if (turnInQuest) {
        // Turn in quest
        const invIdx = player.inventory.findIndex(inv => inv && inv.itemType === turnInQuest.itemNeeded);
        player.inventory[invIdx] = null;
        turnInQuest.completed = true;
        game.gold += turnInQuest.reward;
        game.state = 'interact';
        game.dialogueQueue = [
          giverName + ": Oh perfect, you found it! Thank you so much!",
          "*Quest Complete: " + turnInQuest.name + "!*",
          "*Reward: +" + turnInQuest.reward + " Work Points! (Total: " + game.gold + ")*",
        ];
        game.currentDialogue = game.dialogueQueue.shift();
        return;
      }
      // Offer available quests
      const available = game.quests.filter(q => !q.completed && q.giver === giverName);
      if (available.length > 0) {
        game.state = 'npcMenu';
        game.npcMenuTarget = data;
        game.npcMenuIndex = 0;
        game.npcMenuOptions = available.map(q => ({
          label: q.name, desc: q.description + ' (' + q.rewardDesc + ')', action: 'accept_quest_' + q.id
        }));
        game.npcMenuOptions.push({ label: 'Never mind', desc: 'Leave', action: 'cancel' });
        return;
      } else {
        game.state = 'interact';
        game.dialogueQueue = [];
        game.currentDialogue = giverName + ": Thanks for all the help! I've got nothing else right now.";
        return;
      }
    }

    // Kunal vendor
    if (data.interactType === 'kunal_vendor') {
      game.state = 'vendorMenu';
      game.vendorMenuIndex = 0;
      game.vendorItems = [
        { name: 'Coffee', itemType: 'coffee', cost: 10, desc: 'Speed boost for 8 seconds' },
        { name: 'Energy Drink', itemType: 'energy_drink', cost: 15, desc: 'Reduce toilet meter by 30' },
        { name: 'Headphones', itemType: 'headphones', cost: 12, desc: 'Ignore phone rings for 6 seconds' },
        { name: 'Imodium', itemType: 'imodium', cost: 20, desc: 'Slow toilet urgency for 20 seconds' },
        { name: 'Paper Balls x5', itemType: 'paper_balls', cost: 8, desc: 'Distraction ammo' },
        { name: 'Air Freshener', itemType: 'air_freshener', cost: 10, desc: 'Enemy repellent' },
      ];
      return;
    }

    // Andrew in pub
    if (data.interactType === 'andrew_pub') {
      game.state = 'interact';
      game.dialogueQueue = ["Andrew: *holding 3 pints* PUB! This is the life!", "Andrew: Want one? Go on... just one pint...", "Brayden: I'm working Andrew! ...sort of."];
      game.currentDialogue = game.dialogueQueue.shift();
      return;
    }
    if (data.interactType === 'lax_pub') {
      game.state = 'interact';
      game.dialogueQueue = ["Lax: *nursing a beer* Bro... you made it.", "Lax: Pull up a stool. Relax.", "Brayden: I should probably get back to work...", "Lax: Work can wait. Life is short bro."];
      game.currentDialogue = game.dialogueQueue.shift();
      return;
    }

    game.state = 'interact';
    game.dialogueQueue = [...data.dialogue];
    game.currentDialogue = game.dialogueQueue.shift();
    return;
  }

  if (type === 'item') {
    const emptySlot = player.inventory.indexOf(null);
    if (emptySlot !== -1) {
      player.inventory[emptySlot] = { ...data };
      data.collected = true;
      player.canInteract = null;
    } else {
      game.state = 'interact';
      game.dialogueQueue = [];
      game.currentDialogue = "Your pockets are full! You can only carry 2 items. Use one first with [1] or [2].";
    }
    return;
  }
}

function pickFromFridge() {
  if (game.fridgeItems.length === 0) return;
  const itemType = game.fridgeItems[game.fridgeMenuIndex];

  if (itemType === 'salt') {
    game.saltAmmo = game.saltMax;
    game.fridgeItems.splice(game.fridgeMenuIndex, 1);
    game.state = 'interact';
    game.dialogueQueue = [];
    game.currentDialogue = "You grabbed the salt! 10 shots loaded. Press [SPACE] to fire in the direction you're facing. 3 hits to defeat Andrew!";
  } else if (itemType === 'beer') {
    game.fridgeItems.splice(game.fridgeMenuIndex, 1);
    game.state = 'pub';
    game.gameOverReason = "You drank a beer from the office fridge. One turned into two... two into five... and now you're at the pub. Classic.";
  } else if (itemType === 'energy_drink') {
    game.energyDrinkWorkTimer = 10;
    game.energyDrinkToiletTimer = 15;
    game.fridgeItems.splice(game.fridgeMenuIndex, 1);
    game.state = 'interact';
    game.dialogueQueue = [];
    game.currentDialogue = "You chugged the energy drink! Work speed BOOSTED for 10 seconds! But watch out... your toilet meter will fill faster for 15 seconds!";
  }

  if (game.fridgeMenuIndex >= game.fridgeItems.length) {
    game.fridgeMenuIndex = Math.max(0, game.fridgeItems.length - 1);
  }
}

function advanceDialogue() {
  if (game.dialogueQueue.length > 0) {
    game.currentDialogue = game.dialogueQueue.shift();
  } else {
    game.currentDialogue = null;
    game.state = 'playing';
  }
}

function handleNpcMenuSelect() {
  if (game.npcMenuOptions.length === 0) return;
  const option = game.npcMenuOptions[game.npcMenuIndex];

  if (option.action === 'cancel') {
    game.state = 'playing';
    return;
  }

  if (option.action.startsWith('accept_quest_')) {
    const questId = option.action.replace('accept_quest_', '');
    const quest = game.quests.find(q => q.id === questId);
    if (quest) {
      game.activeQuest = quest;
      game.state = 'interact';
      game.dialogueQueue = [
        quest.giver + ": " + quest.description,
        "*New Quest: " + quest.name + "*",
        "*Find: " + quest.itemNeeded.replace(/_/g, ' ') + "*",
      ];
      game.currentDialogue = game.dialogueQueue.shift();
    }
    return;
  }

  if (option.action === 'pub') {
    game.state = 'pub';
    game.gameOverReason = "You and your mates decided work can wait. Off to the pub! Cheers!";

  }

  if (option.action === 'kunal_talk') {
    game.workMeter = 0;
    game.officeDoorUnlocked = false;
    game.time = Math.max(0, game.time - 60);
    game.state = 'interact';
    game.dialogueQueue = [
      "Kunal: Bro, I'm telling you, tabs are better than spaces!",
      "Brayden: Are you INSANE? Spaces are the standard!",
      "Kunal: Standard?! Your code looks like a ransom note!",
      "Brayden: At least I don't push to main on a Friday!",
      "Kunal: That was ONE time! And the server survived... mostly.",
      "*You've been arguing for a while... Work meter dropped to 0 and you lost 1 minute!*",
    ];
    game.currentDialogue = game.dialogueQueue.shift();
    return;
  }

  if (option.action === 'lax_talk') {
    game.workMeter = 0;
    game.officeDoorUnlocked = false;
    game.time = Math.max(0, game.time - 120);
    game.state = 'interact';
    game.dialogueQueue = [
      "Lax: *takes off one headphone* What's good?",
      "Brayden: Just trying to get some work done...",
      "Kunal: *walks over* Oh, we're having a meeting? Nice.",
      "Lax: So anyway, did you see that new show on Netflix?",
      "Kunal: Bro yes! The one with the time travel?",
      "Brayden: Guys... I really need to work...",
      "Lax: Relax man, the deadline's not for... *checks phone* ...oh.",
      "Kunal: Yeah we should probably let him work.",
      "*The three of you chatted for way too long... Work meter dropped to 0 and you lost 2 minutes!*",
    ];
    game.currentDialogue = game.dialogueQueue.shift();
    return;
  }

  if (option.action === 'lax_work') {
    game.workMeter = Math.max(0, game.workMeter * 0.5);
    if (game.workMeter < game.workThreshold) game.officeDoorUnlocked = false;
    game.state = 'interact';
    game.dialogueQueue = [
      "Brayden: Lax, come on mate, we need to actually do some work.",
      "Lax: *slowly puts headphones down* ...Work?",
      "Lax: Bro, you're the one who came to talk to ME.",
      "Lax: If you wanna work, go sit at your desk instead of chatting.",
      "Lax: Actually... you should work LESS. You look stressed.",
      "*Lax's 'advice' has demotivated you. Work meter dropped by 50%!*",
    ];
    game.currentDialogue = game.dialogueQueue.shift();
    return;
  }
}

function useItem(slot) {
  const item = player.inventory[slot];
  if (!item) return;
  const itemType = item.itemType || item.type;
  switch (itemType) {
    case 'coffee': player._coffeeBoost = 8; break;
    case 'headphones': player._headphoneTimer = 6; break;
    case 'imodium': player.imodiumTimer = 20; break;
    case 'air_freshener': throwPaperBall(); break;
    case 'energy_drink':
      game.toiletMeter = Math.max(0, game.toiletMeter - 30);
      break;
  }
  player.inventory[slot] = null;
}

function drawTitle() {

  const cx = W / 2;
  const floorY = H * 0.45;

  ctx.strokeStyle = 'rgba(60, 70, 110, 0.25)';

  for (let i = 0; i < 20; i++) {

  }

  drawPixelRect(0, floorY - 5, W, 5, '#2a2a3a');

  ctx.fillStyle = '#4a506a';
  ctx.fillRect(0, floorY, W, H - floorY);

  for (let r = 0; r < 12; r++) {
    const fy = floorY + r * 20;
    ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(W, fy); ctx.stroke();
  }
  for (let c = 0; c < 18; c++) {
    ctx.beginPath(); ctx.moveTo(c * 50, floorY); ctx.lineTo(c * 50, H); ctx.stroke();
  }

// --- RANDOM EVENTS ---
function updateRandomEvents(dt) {
  if (game.currentRoom === 'office') return;
  if (game.currentEvent) {
    game.currentEvent.timer -= dt;
    if (game.currentEvent.timer <= 0) game.currentEvent = null;
    return;
  }
  game.randomEventTimer -= dt;
  if (game.randomEventTimer <= 0) {
    game.randomEventTimer = 25 + Math.random() * 20;
    const roll = Math.random();
    if (roll < 0.15) triggerFireDrill();
    else if (roll < 0.25) triggerPhoneRing();
  }
}

function triggerFireDrill() {
  game.currentEvent = { type: 'fireDrill', timer: 10 };
}

function triggerPhoneRing() {
  game.currentEvent = { type: 'phoneRing', timer: 8 };
  game.state = 'interact';
  game.dialogueQueue = [
    "*RING RING* Your phone is going off...",
    "Unknown: Hi, I'm calling about your car's extended warranty...",
    "*You just lost 15 seconds listening to that!*"
  ];
  game.currentDialogue = game.dialogueQueue.shift();
  game.time -= 15;
}

function drawEventOverlay() {
  if (!game.currentEvent) return;
  if (game.currentEvent.type === 'fireDrill') {
    const flash = game.frameCount % 30 < 15;
    ctx.fillStyle = flash ? 'rgba(255, 0, 0, 0.15)' : 'rgba(0, 0, 0, 0)';

    ctx.textAlign = 'center';

    ctx.fillText('FIRE DRILL - EVERYONE EVACUATE', canvas.width/2, 70);

    ctx.textAlign = 'left';
  }
}

// --- SPEECH BUBBLES / QUIPS ---
function updateQuips(dt) {
  game.quipTimer -= dt;
  if (game.quipTimer <= 0) {
    game.quipTimer = 2.5 + Math.random() * 3; // every 2.5-5.5 seconds
    // Brayden quip (always)
    if (Math.random() < 0.5) {
      const q = QUIPS.brayden[Math.floor(Math.random() * QUIPS.brayden.length)];
      game.speechBubbles.push({ text: q, x: player.x, y: player.y - 20, timer: 2.2, color: '#ffdd44', follow: 'player' });
    }
    // NPC quips
    const room = rooms[game.currentRoom];
    if (room.npcs) {
      for (const npc of room.npcs) {
        if (Math.random() < 0.3) {
          const key = npc.name.toLowerCase();
          const quipList = QUIPS[key];
          if (quipList) {
            const q = quipList[Math.floor(Math.random() * quipList.length)];
            game.speechBubbles.push({ text: q, x: npc.x, y: npc.y - 20, timer: 2, color: '#fff', followNpc: npc });
          }
        }
      }
    }
    // Andrew quips from enemies
    if (room.enemies) {
      for (const e of room.enemies) {
        if (e.dead) continue;
        if (e.type === 'zombie' && Math.random() < 0.4) {
          let quipList = QUIPS.andrew.far;
          const dist = Math.hypot(player.x - e.x, player.y - e.y);
          if (dist < T * 3) quipList = QUIPS.andrew.close;
          else if (dist < T * 6) quipList = QUIPS.andrew.medium;
          const q = quipList[Math.floor(Math.random() * quipList.length)];
          game.speechBubbles.push({ text: q, x: e.x, y: e.y - 20, timer: 2, color: '#aaa', followEnemy: e });
        }
      }
    }
  }
  // Update existing bubbles
  for (let i = game.speechBubbles.length - 1; i >= 0; i--) {
    const b = game.speechBubbles[i];
    b.timer -= dt;
    if (b.follow === 'player') { b.x = player.x; b.y = player.y - 20; }
    if (b.followNpc) { b.x = b.followNpc.x; b.y = b.followNpc.y - 20; }
    if (b.followEnemy) { b.x = b.followEnemy.x; b.y = b.followEnemy.y - 20; }
    if (b.timer <= 0) game.speechBubbles.splice(i, 1);
  }
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawSpeechBubbles() {
  for (const b of game.speechBubbles) {
    const alpha = Math.min(1, b.timer / 0.5); // fade out
    const bx = b.x, by = b.y - (2 - b.timer) * 8; // float upward
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 9px monospace';
    const textW = ctx.measureText(b.text).width;
    const padX = 6, padY = 4;
    const bubbleW = textW + padX * 2, bubbleH = 14 + padY * 2;
    const bxC = bx - bubbleW / 2 + 15;
    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    drawRoundRect(bxC, by - bubbleH, bubbleW, bubbleH, 4);
    ctx.fill();
    // Border
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 1;
    drawRoundRect(bxC, by - bubbleH, bubbleW, bubbleH, 4);
    ctx.stroke();
    // Tail
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.moveTo(bx + 10, by);
    ctx.lineTo(bx + 15, by + 6);
    ctx.lineTo(bx + 20, by);
    ctx.fill();
    // Text
    ctx.fillStyle = b.color;
    ctx.fillText(b.text, bxC + padX, by - padY - 3);
    ctx.globalAlpha = 1;
  }
}

// --- WORK OVERLAY ---
function drawWorkOverlay() {
  const W = canvas.width, H = canvas.height;
  const pct = Math.floor(game.workMeter);
  const needed = game.workThreshold;
  const ratio = game.workMeter / game.maxWork;

  // Dark overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fillRect(0, 0, W, H);

  // Central work panel
  const panelW = 380, panelH = 140;
  const px = W / 2 - panelW / 2, py = H / 2 - panelH / 2 - 20;
  drawPixelRect(px, py, panelW, panelH, 'rgba(0, 20, 40, 0.9)');
  ctx.strokeStyle = '#4a6a9a'; ctx.lineWidth = 2;
  ctx.strokeRect(px, py, panelW, panelH);
  ctx.lineWidth = 1;

  ctx.textAlign = 'center';

  // "WORKING..." title with animated dots
  const dots = '.'.repeat((Math.floor(game.frameCount / 20) % 3) + 1);
  ctx.fillStyle = '#6ab4ff'; ctx.font = 'bold 18px monospace';
  ctx.fillText('WORKING' + dots, W / 2, py + 26);

  // Progress bar
  const barX = px + 30, barY = py + 40, barW = panelW - 60, barH = 18;
  drawPixelRect(barX, barY, barW, barH, '#1a2a3a');
  ctx.strokeStyle = '#3a5a7a'; ctx.strokeRect(barX, barY, barW, barH);
  const fillW = barW * ratio;
  const barColor = ratio >= (needed / game.maxWork) ? '#4a9a4a' : '#4a6a9a';
  drawPixelRect(barX + 1, barY + 1, fillW - 2, barH - 2, barColor);
  // Percentage text on bar
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace';
  ctx.fillText(`${pct}% / ${needed}%`, W / 2, barY + 14);

  // Funny task text
  ctx.fillStyle = '#aaccee'; ctx.font = '11px monospace';
  ctx.fillText(game.workTask, W / 2, py + 82);

  // Animated typing indicator
  const typeDots = '|/-\\';
  const typeChar = typeDots[Math.floor(game.frameCount / 8) % typeDots.length];
  ctx.fillStyle = '#6ab4ff'; ctx.font = '13px monospace';
  ctx.fillText(typeChar, W / 2 + ctx.measureText(game.workTask).width / 2 + 10, py + 82);

  // Bottom hint
  ctx.fillStyle = '#666'; ctx.font = '10px monospace';
  ctx.fillText('Release [E] to stop working', W / 2, py + 106);

  // Brayden quip below panel (intermittent)
  if (Math.sin(game.frameCount * 0.03) > 0.5) {
    const workQuips = [
      '"I could be on the toilet right now..."',
      '"My bowels are NOT happy about this."',
      '"Type faster... CLENCH harder..."',
      '"The things I do for a locked door."',
      '"Is this what productivity looks like?"',
      '"Spreadsheets now, toilet later..."',
    ];
    const qi = Math.floor(game.frameCount / 150) % workQuips.length;
    ctx.fillStyle = '#ffd700'; ctx.font = 'italic 10px monospace';
    ctx.fillText(workQuips[qi], W / 2, py + panelH + 20);
  }

  ctx.textAlign = 'left';
}

// --- MAIN LOOP ---


let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  game.frameCount++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const k in justPressed) delete justPressed[k];

  switch (game.state) {
    case 'title':
      drawTitle();
      break;

    case 'playing':
    case 'interact':
    case 'fridgeMenu':
    case 'npcMenu':
    case 'vendorMenu':
      if (game.state === 'playing') {
        updatePlayer(dt);
        updateEnemies(dt);
        updateNpcMovement(dt);
        updateSaltProjectiles(dt);
        updatePaperBalls(dt);
        updateTimers(dt);
        updateQuips(dt);
        updateRandomEvents(dt);
        updateEmailNotifications(dt);
      }
      drawRoom();

      const room = rooms[game.currentRoom];
      if (room.items) room.items.forEach(drawItem);
      if (room.enemies) room.enemies.forEach(drawEnemy);
      if (room.npcs) room.npcs.forEach(drawNPC);
      drawSaltProjectiles();
      drawPaperBalls();
      drawPlayer();
      drawUI();
      drawEffects();
      drawInteractionHints();
      drawSpeechBubbles();
      drawEventOverlay();
      drawEmailNotifications();
      if (game.isWorking) drawWorkOverlay();

      if (game.state === 'interact') drawDialogue();
      if (game.state === 'fridgeMenu') drawFridgeMenu();
      if (game.state === 'npcMenu') drawNpcMenu();
      if (game.state === 'vendorMenu') drawVendorMenu();
      break;

    case 'pub':
      drawPubScreen();
      break;

    case 'win':
      drawWinScreen();
      break;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
